function resizeImage(file) {
  return new Promise((resolve,reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new window.Image();
      img.onload = () => {
        const maxDim=620; let {width,height}=img;
        if(width>height&&width>maxDim){height=Math.round((height*maxDim)/width);width=maxDim;}
        else if(height>maxDim){width=Math.round((width*maxDim)/height);height=maxDim;}
        const canvas=document.createElement("canvas"); canvas.width=width; canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        const dataUrl=canvas.toDataURL("image/jpeg",0.65);
        resolve({dataUrl,base64:dataUrl.split(",")[1],mediaType:"image/jpeg"});
      };
      img.onerror=reject; img.src=e.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
function computeFingerprint(dataUrl) {
  return new Promise((resolve,reject) => {
    const img=new window.Image();
    img.onload=()=>{
      const size=8,canvas=document.createElement("canvas"); canvas.width=size; canvas.height=size;
      canvas.getContext("2d").drawImage(img,0,0,size,size);
      const data=canvas.getContext("2d").getImageData(0,0,size,size).data;
      const gray=[]; for(let i=0;i<data.length;i+=4) gray.push(Math.round((data[i]+data[i+1]+data[i+2])/3));
      resolve(gray);
    };
    img.onerror=reject; img.src=dataUrl;
  });
}
function fingerprintDiff(a,b){
  if(!a||!b||a.length!==b.length) return Infinity;
  let sum=0; for(let i=0;i<a.length;i++) sum+=Math.abs(a[i]-b[i]); return sum/a.length;
}
function getLocation(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (pos)=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      ()=>resolve(null),{timeout:6000,maximumAge:60000}
    );
  });
}
function distanceMeters(a,b){
  if(!a||!b) return Infinity;
  const R=6371000,dLat=((b.lat-a.lat)*Math.PI)/180,dLng=((b.lng-a.lng)*Math.PI)/180;
  const lat1=(a.lat*Math.PI)/180,lat2=(b.lat*Math.PI)/180;
  const sinDLat=Math.sin(dLat/2),sinDLng=Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(sinDLat*sinDLat+Math.cos(lat1)*Math.cos(lat2)*sinDLng*sinDLng));
}

function dataUrlToParts(dataUrl){
  const m=/^data:(.*?);base64,(.*)$/.exec(dataUrl||"");
  if(!m) return null; return {mediaType:m[1],base64:m[2]};
}
async function callGemini(parts,timeoutMs=45000){
  // Конвертируем parts (Gemini-формат) в формат OpenAI
  const openaiContent=parts.map((p)=>{
    if(p.text!==undefined) return {type:"text",text:p.text};
    if(p.inline_data) return {type:"image_url",image_url:{url:"data:"+p.inline_data.mime_type+";base64,"+p.inline_data.data}};
    return null;
  }).filter(Boolean);
  const requestBody={
    model:"gpt-4o-mini",
    messages:[{role:"user",content:openaiContent}],
    temperature:0.1,
    max_tokens:300,
  };
  const timeoutPromise=new Promise((_,reject)=>setTimeout(()=>reject(new Error("Timeout: превышено время ожидания")),timeoutMs));
  const fetchPromise=fetch(GEMINI_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(requestBody),
  });
  const resp=await Promise.race([fetchPromise,timeoutPromise]);
  const json=await resp.json();
  if(!resp.ok||json.error) throw new Error(json?.error?.message||"OpenAI API error "+resp.status);
  const text=json?.choices?.[0]?.message?.content||"";
  return {content:[{type:"text",text}]};
}

      {text:`Сравни два фото одного и того же места. Первое — до уборки (был мусор), второе — после. Определи, действительно ли на втором фото место теперь чистое (мусор убран). Ответь СТРОГО в виде JSON без markdown: {"is_clean": true или false, "note": короткий комментарий НА РУССКОМ языке, не больше 12 слов}.`},
    ];
    try{
      let data;
      try{data=await callGemini(parts,45000);}
      catch(networkErr){if(networkErr.name==="AbortError")throw networkErr;data=mockGeminiCleanResponse();}
      const textBlock=(data.content||[]).map((b)=>b.text||"").join("\n");
      const clean=textBlock.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setAfterAnalysis(parsed);
      if(parsed.is_clean){
        const beforeCtx=computeAchCtx(reports,points);
        markCleaned(cleaningReportId,afterPhoto.dataUrl);
        const afterReports=reports.map((r)=>r.id===cleaningReportId?{...r,status:"cleaned"}:r);
        const afterCtx=computeAchCtx(afterReports,points);
        const newly=ACHIEVEMENTS.filter((a)=>!a.check(beforeCtx)&&a.check(afterCtx));
        setAfterNewAchievements(newly);setScreen("afterSuccess");
      }else{setScreen("afterRejected");}
    }catch(err){setAfterErrorMsg(t("defaultErrorMsg"));setScreen("afterCapture");}
  }

  async function analyzePhoto(photosArray,location,lang){
    const primary=photosArray[0];
    let matchCount=0;
    photosArray.forEach((p)=>{
      if(!p.fingerprint)return;
      // Считаем сколько раз это фото уже встречалось (включая оригинал, повторы и предупреждения)
      const c=reportsRef.current.filter((r)=>r.fingerprint&&fingerprintDiff(r.fingerprint,p.fingerprint)<DUPLICATE_THRESHOLD).length;
      if(c>matchCount)matchCount=c;
    });
    if(matchCount>0){
      const tiers=getFraudTiers(lang);
      // matchCount=1 → 1-е нарушение (предупреждение), 2 → штраф 10, 3+ → штраф 30
      const tier=tiers[Math.min(matchCount-1,tiers.length-1)];
      idCounter.current+=1;
      const flaggedReport={id:"r-"+idCounter.current,category:tier.points===0?"предупреждение":"повтор",severity:null,note:tier.note,points:-tier.points,time:"только что",img:primary.dataUrl,fingerprint:primary.fingerprint,location:location||null,pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[flaggedReport,...prev].slice(0,15));
      setPoints((prev)=>Math.max(0,prev-tier.points));
      return {kind:"duplicate",tier,violationNumber:matchCount,analysis:null};
    }
    const geoMatch=location?reportsRef.current.find((r)=>r.location&&r.status!=="cleaned"&&r.category!=="повтор"&&r.category!=="предупреждение"&&r.category!=="та же точка"&&distanceMeters(r.location,location)<GEO_DUPLICATE_RADIUS_M):null;
    if(geoMatch){
      idCounter.current+=1;
      const sameSpotReport={id:"r-"+idCounter.current,category:"та же точка",severity:null,note:"Эта точка уже отмечена на карте — заявка уже создана",points:0,time:"только что",img:primary.dataUrl,fingerprint:primary.fingerprint,location:location||null,pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[sameSpotReport,...prev].slice(0,15));
      return {kind:"samespot",analysis:null,matched:geoMatch,viaHistogram:false,debugSim:"geo"};
    }
    // Собираем активные заявки с фото как эталоны для сравнения ракурсов
    const allCandidates=reportsRef.current.filter((r)=>r.img&&r.status!=="cleaned"&&r.category!=="повтор"&&r.category!=="предупреждение"&&r.category!=="та же точка"&&dataUrlToParts(r.img)).slice(0,3);
    async function callAI(candidatesForCall,timeoutMs){
      const parts=[];
      photosArray.forEach((p,i)=>{
        if(photosArray.length>1)parts.push({text:`Фото ${i+1}:`});
        parts.push({inline_data:{mime_type:p.mediaType||"image/jpeg",data:p.base64}});
      });
      candidatesForCall.forEach((r,i)=>{const cp=dataUrlToParts(r.img);if(cp){parts.push({text:`Эталон ${i+1}:`});parts.push({inline_data:{mime_type:cp.mediaType,data:cp.base64}});}});
      parts.push({text:buildPrompt(photosArray.length,candidatesForCall.length)});
      try{return await callGemini(parts,timeoutMs);}
      catch(networkErr){if(networkErr.name==="AbortError")throw networkErr;console.error("Gemini error:",networkErr.message||networkErr);throw networkErr;}
    }
    let data,usedCandidates=allCandidates;
    try{data=await callAI(allCandidates,45000);}
    catch(err){
      if(allCandidates.length>0){
        try{usedCandidates=[];data=await callAI([],45000);}
        catch(err2){return {kind:"error",msg:err2.name==="AbortError"?"Связь слишком медленная. Попробуй на Wi-Fi.":`Не удалось отправить фото (${err2.message||"ошибка связи"}). Проверь интернет.`};}
      }else if(err.name==="AbortError"){return {kind:"error",msg:"Запрос занял слишком много времени. Попробуй на Wi-Fi."};}
      else{return {kind:"error",msg:err.message||"Не удалось отправить фото — проверь интернет-соединение."};}
    }
    let parsed;
    try{const textBlock=(data.content||[]).map((b)=>b.text||"").join("\n");const clean=textBlock.replace(/```json|```/g,"").trim();parsed=JSON.parse(clean);}
    catch(err){return {kind:"error",msg:"AI ответил в неожиданном формате. Попробуй другое фото — обычно помогает."};}
    const dupIndex=Number(parsed.duplicate_of);
    const aiDuplicateMatch=dupIndex>=1&&dupIndex<=usedCandidates.length?usedCandidates[dupIndex-1]:null;
    if(aiDuplicateMatch){
      idCounter.current+=1;
      const sameSpotReport={id:"r-"+idCounter.current,category:"та же точка",severity:parsed.severity||null,note:"AI узнал ту же кучу мусора с другого ракурса — заявка уже создана",points:0,time:"только что",img:primary.dataUrl,fingerprint:primary.fingerprint,location:location||null,pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[sameSpotReport,...prev].slice(0,15));
      return {kind:"samespot",analysis:parsed,matched:aiDuplicateMatch,viaHistogram:true,debugSim:dupIndex};
    }
    if(parsed.is_trash){
      const pts=(parsed.severity||3)*10; idCounter.current+=1;
      let badge=false;
      const hasEverSubmitted=reportsRef.current.some((r)=>typeof r.id==="string"&&r.id.startsWith("r-"));
      if(!hasEverSubmitted){try{const flag=await window.storage.get("ecobin_first_badge_given",false).catch(()=>null);if(!flag){badge=true;await window.storage.set("ecobin_first_badge_given","1",false).catch(()=>{});}}catch{badge=true;}}
      const newReport={id:"r-"+idCounter.current,category:parsed.category||"мусор",severity:parsed.severity||3,note:parsed.note||"",points:pts,time:"только что",img:primary.dataUrl,images:photosArray.map((p)=>p.dataUrl),fingerprint:primary.fingerprint,location:location||null,status:"pending",pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[newReport,...prev].slice(0,15));
      setPoints((prev)=>prev+pts);
      return {kind:"trash",analysis:parsed,points:pts,badge,debugSim:dupIndex||null,report:newReport};
    }
    return {kind:"rejected",analysis:parsed,debugSim:dupIndex||null};
  }

  function enqueuePhoto(photosArray,location){setPendingQueue((prev)=>[...prev,{photosArray,location}].slice(-10));}

  async function submitForAnalysis(){
    if(photos.length===0)return;
    if(typeof navigator!=="undefined"&&navigator.onLine===false){enqueuePhoto(photos,batchLocation);setScreen("queued");return;}
    setScreen("analyzing");setErrorMsg("");
    const beforeCtx=computeAchCtx(reports,points);
    const result=await analyzePhoto(photos,batchLocation,language);
    if(result.kind==="error"){setErrorMsg(result.msg);setScreen("error");return;}
    setAnalysis(result.analysis);
    setDebugSim(result.debugSim!==undefined?result.debugSim:null);
    if(result.kind==="duplicate"){setDupInfo({violationNumber:result.violationNumber,...result.tier});setScreen("duplicate");return;}
    if(result.kind==="samespot"){setSameSpotInfo({matched:result.matched,viaHistogram:result.viaHistogram});setScreen("samespot");return;}
    if(result.kind==="trash"){
      setBadgeUnlocked(!!result.badge);
      const afterReports=result.report?[result.report,...reports]:reports;
      const afterCtx=computeAchCtx(afterReports,points+result.points);
      const newly=ACHIEVEMENTS.filter((a)=>!a.check(beforeCtx)&&a.check(afterCtx));
      setNewAchievements(newly);setScreen("result");return;
    }
    setScreen("rejected");
  }

  const showTabs=screen==="home"||screen==="profile"||screen==="leaderboard"||screen==="settings";
  const t=(key)=>(STRINGS[language]&&STRINGS[language][key])||STRINGS.ru[key]||key;
  const isTelegramApp=typeof window!=="undefined"&&window.Telegram&&window.Telegram.WebApp&&!!window.Telegram.WebApp.initData;
  const LIGHT_PALETTE={forest:"#1B4332",forest2:"#2D6A4F",amber:"#FFB703",lightbg:"#F6FAF7",card:"#EAF4EE",textdark:"#16241F",muted:"#5C6B66",red:"#C1440E",white:"#FFFFFF"};
  const DARK_PALETTE={forest:"#3FA374",forest2:"#4FC189",amber:"#FFD166",lightbg:"#0F1C17",card:"#1C2E27",textdark:"#F0F7F3",muted:"#A9C4B8",red:"#FF8A66",white:"#1C2E27"};
  const palette=theme==="dark"?DARK_PALETTE:LIGHT_PALETTE;
  const themeCssVars={"--ecobin-forest":palette.forest,"--ecobin-forest2":palette.forest2,"--ecobin-amber":palette.amber,"--ecobin-lightbg":palette.lightbg,"--ecobin-card":palette.card,"--ecobin-textdark":palette.textdark,"--ecobin-muted":palette.muted,"--ecobin-red":palette.red,"--ecobin-white":palette.white};
  const telegramHeight=tgViewportHeight?`${tgViewportHeight}px`:"100vh";
  const telegramWidthPx=tgViewportWidth||(typeof window!=="undefined"?window.innerWidth:380);
  const outerWrapStyle=isTelegramApp?{width:"100vw",maxWidth:"100vw",minHeight:telegramHeight,overflowX:"hidden",boxSizing:"border-box",margin:0,padding:0,...themeCssVars}:{display:"flex",justifyContent:"center",padding:"24px 12px",fontFamily:"-apple-system, Segoe UI, Roboto, sans-serif",...themeCssVars};
  const phoneFrameStyle=isTelegramApp?{width:"100vw",maxWidth:"100vw",overflowX:"hidden",boxSizing:"border-box",margin:0,padding:0}:{width:380,background:"#0c1a14",borderRadius:40,padding:12,boxShadow:"0 20px 60px rgba(0,0,0,0.35)"};
  const screenBoxStyle=isTelegramApp?{width:"100vw",maxWidth:"100vw",height:tgViewportHeight||undefined,minHeight:tgViewportHeight?undefined:telegramHeight,background:LIGHTBG,position:"relative",display:"flex",flexDirection:"column",overflowX:"hidden",boxSizing:"border-box",margin:0}:{width:"100%",height:740,background:LIGHTBG,borderRadius:30,overflow:"hidden",position:"relative",display:"flex",flexDirection:"column"};

  return (
    <LanguageContext.Provider value={language}>
    <div style={outerWrapStyle}>
      <div style={phoneFrameStyle}>
        <div style={screenBoxStyle} data-screen-box="1">
          {screen!=="splash"&&(
            <div style={{display:"flex",justifyContent:isTelegramApp?"flex-end":"space-between",alignItems:"center",padding:"10px 18px 4px",fontSize:12,color:TEXTDARK,fontWeight:600}}>
              {!isTelegramApp&&<span>9:41</span>}
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={replayAsNewUser} title={t("replayTooltip")} style={{background:CARD,border:"none",borderRadius:8,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><RotateCcw size={11} color={FOREST}/></button>
                <span style={{background:AMBER,color:FOREST,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10,letterSpacing:0.5}}>MVP · ДЕМО</span>
              </div>
            </div>
          )}
          <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:screen==="splash"?0:"8px 18px 0",boxSizing:"border-box",width:"100%",maxWidth:"100%"}}>
            {screen==="splash"&&<SplashScreen exiting={splashExiting}/>}
            {screen==="language-select"&&<LanguageSelectScreen onSelect={(code)=>{setLanguage(code);setScreen("onboarding");}}/>}
            {screen==="onboarding"&&<OnboardingScreen onDone={finishOnboarding}/>}
            {screen==="home"&&<HomeScreen points={points} reports={reports} onSelectPin={setSelectedId} pendingCount={pendingQueue.length} isOnline={isOnline} binFills={binFills} binDevices={binDevices} onSelectBin={setSelectedBinId} onOpenDashboard={()=>setScreen("dashboard")} myLocation={myLocation} onOpenFullMap={()=>setScreen("fullmap")}/>}
            {screen==="fullmap"&&<FullMapScreen reports={reports} bins={BIN_LOCATIONS} binFills={binFills} binDevices={binDevices} myLocation={myLocation} onSelectPin={(id)=>{setSelectedId(id);}} onSelectBin={(id)=>{setSelectedBinId(id);}} onBack={()=>setScreen("home")} lang={language}/>}
            {screen==="profile"&&<ProfileScreen points={points} reports={reports} onReset={resetDemo} onExport={exportReportsCSV}/>}
            {screen==="settings"&&<SettingsScreen onBack={()=>setScreen("home")} language={language} onSetLanguage={setLanguage} theme={theme} onSetTheme={setTheme}/>}
            {screen==="leaderboard"&&<LeaderboardScreen reports={reports}/>}
            {screen==="dashboard"&&<DashboardScreen reports={reports} binFills={binFills} binDevices={binDevices} onBack={()=>setScreen("home")}/>}
            {screen==="capture"&&<CaptureScreen photos={photos} onBack={()=>setScreen("home")} onPickCamera={()=>cameraInputRef.current&&cameraInputRef.current.click()} onRemove={removePhoto} onSubmit={submitForAnalysis} errorMsg={errorMsg} maxPhotos={MAX_PHOTOS_PER_REPORT}/>}
            {screen==="analyzing"&&<AnalyzingScreen photos={photos}/>}
            {screen==="queued"&&<QueuedScreen onDone={()=>setScreen("home")}/>}
            {screen==="result"&&<ResultScreen analysis={analysis} photos={photos} badgeUnlocked={badgeUnlocked} newAchievements={newAchievements} debugSim={debugSim} onDone={()=>setScreen("home")}/>}
            {screen==="rejected"&&<RejectedScreen analysis={analysis} debugSim={debugSim} onRetry={openCapture} onCancel={()=>setScreen("home")}/>}
            {screen==="manualConfirm"&&<ManualConfirmScreen photos={photos} category={manualCategory} onSetCategory={setManualCategory} onConfirm={()=>{const pts=20;const newReport={id:Date.now().toString(),img:photos[0]?.dataUrl||null,images:photos.map((p)=>p.dataUrl),category:manualCategory,note:null,severity:2,points:pts,time:new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}),status:"pending",location:batchLocation,pos:{top:`${30+Math.random()*40}%`,left:`${20+Math.random()*60}%`}};setReports((prev)=>[newReport,...prev]);setPoints((p)=>p+pts);setAnalysis({category:manualCategory,severity:2,note:null});setBadgeUnlocked(false);setNewAchievements([]);setScreen("result");}} onCancel={()=>setScreen("home")}/>}
            {screen==="duplicate"&&<DuplicateScreen info={dupInfo} onDone={()=>setScreen("home")}/>}
            {screen==="samespot"&&<SameSpotScreen info={sameSpotInfo} onDone={()=>setScreen("home")}/>}

            {screen==="afterAnalyzing"&&<AfterAnalyzingScreen photo={afterPhoto}/>}
            {screen==="afterSuccess"&&<AfterSuccessScreen report={reports.find((r)=>r.id===cleaningReportId)} photo={afterPhoto} analysis={afterAnalysis} newAchievements={afterNewAchievements} onDone={()=>setScreen("home")}/>}
            {screen==="afterRejected"&&<AfterRejectedScreen analysis={afterAnalysis} onRetry={()=>setScreen("afterCapture")} onCancel={()=>setScreen("home")}/>}
          </div>
          <input ref={cameraInputRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>

          {(screen==="home"||screen==="fullmap")&&selectedBinId&&<BinDetailSheet bin={BIN_LOCATIONS.find((b)=>b.id===selectedBinId)} fill={binFills[BIN_LOCATIONS.findIndex((b)=>b.id===selectedBinId)]} device={binDevices[BIN_LOCATIONS.findIndex((b)=>b.id===selectedBinId)]} onClose={()=>setSelectedBinId(null)}/>}
          {showTour&&screen==="home"&&<TourOverlay onDone={()=>setShowTour(false)}/>}

              <button data-tour="add" onClick={openCapture} style={{width:50,height:50,borderRadius:25,background:FOREST,border:"none",display:"flex",alignItems:"center",justifyContent:"center",marginTop:-22,boxShadow:"0 6px 16px rgba(27,67,50,0.4)",cursor:"pointer",flexShrink:0}}><Plus size={24} color="#FFFFFF"/></button>
              <button data-tour="profile" onClick={()=>setScreen("profile")} style={navBtnStyle}><User size={20} color={screen==="profile"?FOREST:MUTED}/><span style={{fontSize:10,color:screen==="profile"?FOREST:MUTED,fontWeight:screen==="profile"?700:500}}>{t("navProfile")}</span></button>

      h("div",{style:{display:"flex",gap:5,marginTop:12,marginBottom:10,justifyContent:"center"}},
        TOUR_STEPS.map((_,i)=>h("span",{key:i,style:{width:i===step?16:6,height:6,borderRadius:3,background:i===step?"#1B4332":"#D7E5DC",transition:"all 0.2s"}}))

      <p style={{fontSize:12.5,color:MUTED,margin:"0 0 14px",lineHeight:1.5}}>{t("manualConfirmDesc")}</p>
      {photos&&photos[0]&&<img src={photos[0].dataUrl} alt="" style={{width:"100%",height:130,objectFit:"cover",borderRadius:14,marginBottom:14}}/>}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:18}}>{MANUAL_CATEGORIES.map((cat)=>(<button key={cat} onClick={()=>onSetCategory(cat)} style={{padding:"6px 11px",borderRadius:9,border:`1px solid ${category===cat?FOREST:CARD}`,background:category===cat?CARD:"transparent",color:category===cat?FOREST:MUTED,fontWeight:category===cat?700:500,fontSize:12,cursor:"pointer"}}>{categoryLabel(cat,lang)}</button>))}</div>
      <button onClick={onConfirm} style={primaryBtnStyle}>{t("manualConfirmBtn")}</button>
      <button onClick={onCancel} style={secondaryBtnStyle}>{t("manualNotTrash")}</button>
    </div>
  );
}
function ErrorScreen({msg,onRetry,onNewPhoto,onCancel}){
  const t=useT();
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 0 12px",gap:12,textAlign:"center"}}>
      <div style={{width:64,height:64,borderRadius:32,background:"#FFF3F0",display:"flex",alignItems:"center",justifyContent:"center"}}><AlertTriangle size={32} color={RED}/></div>
      <p style={{margin:0,fontSize:17,fontWeight:700,color:TEXTDARK,fontFamily:"Georgia, serif"}}>{t("checkFailedTitle")}</p>
      <p style={{margin:0,fontSize:12.5,color:MUTED,maxWidth:"92%",lineHeight:1.5}}>{msg||t("defaultErrorMsg")}</p>
      <button onClick={onRetry} style={primaryBtnStyle}>{t("tryAgain")}</button>
      <button onClick={onNewPhoto} style={secondaryBtnStyle}>{t("newPhoto")}</button>
      <button onClick={onCancel} style={{...secondaryBtnStyle,color:MUTED,border:"none"}}>{t("cancel")}</button>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
