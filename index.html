function binStatus(fill,lang){
  if(fill>=85) return {color:RED,label:BIN_STATUS_LABELS.full[lang]||BIN_STATUS_LABELS.full.ru};
  if(fill>=50) return {color:AMBER,label:BIN_STATUS_LABELS.filling[lang]||BIN_STATUS_LABELS.filling.ru};
  return {color:FOREST2,label:BIN_STATUS_LABELS.available[lang]||BIN_STATUS_LABELS.available.ru};
}
const LEVELS=[
  {min:0,key:"levelNovice"},
  {min:50,key:"levelActive"},
  {min:150,key:"levelHero"},
  {min:300,key:"levelGuardian"},
  {min:600,key:"levelKeeper"},
  {min:1000,key:"levelLegend"},
];
function levelIndex(points){ let idx=0; for(let i=0;i<LEVELS.length;i++){ if(points>=LEVELS[i].min) idx=i; } return idx; }
function levelTitle(points){ return LEVELS[levelIndex(points)].key; }
function levelInfo(points){
  const i=levelIndex(points);
  const cur=LEVELS[i], next=LEVELS[i+1]||null;
  if(!next) return {cur,next:null,pct:100,remaining:0,index:i,total:LEVELS.length};
  const span=next.min-cur.min;
  const pct=Math.max(0,Math.min(100,((points-cur.min)/span)*100));
  return {cur,next,pct,remaining:Math.max(0,next.min-points),index:i,total:LEVELS.length};
}
function pluralRu(n,one,few,many){
  const m10=n%10,m100=n%100;
  if(m10===1&&m100!==11)return one;
  if(m10>=2&&m10<=4&&(m100<10||m100>=20))return few;
  return many;
}
function dayKey(ts){ const d=new Date(ts); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function computeStreak(reports){
  const days=new Set();
  reports.forEach((r)=>{
    if(r.category==="повтор"||r.category==="предупреждение"||r.category==="та же точка")return;
    if(r.createdAt)days.add(dayKey(r.createdAt));
  });
  if(days.size===0)return {count:0,days};
  const now=new Date(); now.setHours(12,0,0,0);
  const today=dayKey(now.getTime());
  const yesterday=dayKey(now.getTime()-86400000);
  let start=null;
  if(days.has(today))start=0; else if(days.has(yesterday))start=1; else return {count:0,days};
  let count=0;
  for(let i=start;i<400;i++){
    if(days.has(dayKey(now.getTime()-i*86400000)))count++; else break;
  }
  return {count,days};
}

function resizeImage(file) {
  return new Promise((resolve,reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new window.Image();
      img.onload = () => {
        const maxDim=620; let {width,height}=img;
        if(width>height&&width>maxDim){height=Math.round((height*maxDim)/width);width=maxDim;}
        else if(height>maxDim){width=Math.round((width*maxDim)/height);height=maxDim;}
        const canvas=document.createElement("canvas"); canvas.width=width; canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        const dataUrl=canvas.toDataURL("image/jpeg",0.65);
        resolve({dataUrl,base64:dataUrl.split(",")[1],mediaType:"image/jpeg"});
      };
      img.onerror=reject; img.src=e.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
function computeFingerprint(dataUrl) {
  return new Promise((resolve,reject) => {
    const img=new window.Image();
    img.onload=()=>{
      const size=8,canvas=document.createElement("canvas"); canvas.width=size; canvas.height=size;
      canvas.getContext("2d").drawImage(img,0,0,size,size);
      const data=canvas.getContext("2d").getImageData(0,0,size,size).data;
      const gray=[]; for(let i=0;i<data.length;i+=4) gray.push(Math.round((data[i]+data[i+1]+data[i+2])/3));
      resolve(gray);

  });
}
function fingerprintDiff(a,b){
  if(!a||!b||a.length!==b.length) return Infinity;
  let sum=0; for(let i=0;i<a.length;i++) sum+=Math.abs(a[i]-b[i]); return sum/a.length;
}
const addressCache={};
async function reverseGeocode(lat,lng){
  const key=lat.toFixed(4)+","+lng.toFixed(4);
  if(addressCache[key]!==undefined) return addressCache[key];
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&addressdetails=1&lat="+lat+"&lon="+lng;
    const resp=await Promise.race([fetch(url,{headers:{"Accept":"application/json"}}),new Promise((_,rj)=>setTimeout(()=>rj(new Error("t")),7000))]);
    const j=await resp.json();
    const a=j.address||{};
    const road=a.road||a.pedestrian||a.footway||a.residential||a.neighbourhood||a.suburb||null;
    const num=a.house_number?" "+a.house_number:"";
    const result=road?road+num:(a.suburb||a.city_district||a.city||null);
    addressCache[key]=result||null;
    return addressCache[key];
  }catch{ addressCache[key]=null; return null; }
}
function useAddress(location){

  useEffect(()=>{

    if(!location){setAddr(null);return;}
    reverseGeocode(location.lat,location.lng).then((a)=>{if(alive)setAddr(a);});
    return()=>{alive=false;};
  },[location&&location.lat,location&&location.lng]);
  return addr;
}

// Telegram asks for permission itself — the dialog shows the bot, not the hosting domain.
function telegramLocation(){
  return new Promise((resolve)=>{
    try{
      const tg=window.Telegram&&window.Telegram.WebApp;
      const lm=tg&&tg.LocationManager;
      if(!lm||typeof lm.init!=="function"||typeof lm.getLocation!=="function") return resolve(null);
      let done=false;
      const finish=(v)=>{ if(!done){ done=true; resolve(v); } };
      setTimeout(()=>finish(null),7000);
      lm.init(()=>{
        try{
          lm.getLocation((loc)=>{
            if(loc&&typeof loc.latitude==="number"&&typeof loc.longitude==="number"){
              finish({lat:loc.latitude,lng:loc.longitude});
            }else{
              finish(null);
            }
          });
        }catch{ finish(null); }
      });
    }catch{ resolve(null); }
  });
}

function distanceMeters(a,b){
  if(!a||!b) return Infinity;
  const R=6371000,dLat=((b.lat-a.lat)*Math.PI)/180,dLng=((b.lng-a.lng)*Math.PI)/180;
  const lat1=(a.lat*Math.PI)/180,lat2=(b.lat*Math.PI)/180;
  const sinDLat=Math.sin(dLat/2),sinDLng=Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(sinDLat*sinDLat+Math.cos(lat1)*Math.cos(lat2)*sinDLng*sinDLng));
}

async function callGemini(parts,timeoutMs=45000){

  };

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

  ctx.fillStyle="#FFB703"; ctx.font="700 148px Georgia, serif";
  ctx.fillText("+"+pts,90,S-232);
  ctx.fillStyle="#CFE8DA"; ctx.font="600 34px -apple-system, Segoe UI, Roboto, sans-serif";
  ctx.fillText(tagline||"",90,S-186);

  // разделитель
  ctx.strokeStyle="rgba(255,255,255,0.16)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(58,S-146); ctx.lineTo(S-58,S-146); ctx.stroke();

  // футер
  ctx.fillStyle="rgba(207,232,218,0.85)"; ctx.font="600 28px -apple-system, Segoe UI, Roboto, sans-serif";
  ctx.fillText("@ecobin_uz_bot",58,S-96);
  const right=[levelText,districtText].filter(Boolean).join("  ·  ");
  if(right){
    ctx.textAlign="right"; ctx.fillStyle="rgba(207,232,218,0.6)";
    ctx.fillText(right,S-58,S-96);
    ctx.textAlign="left";
  }
  return cv;
}

  async function analyzePhoto(photosArray,location,lang){
    const primary=photosArray[0];
    let matchCount=0;
    photosArray.forEach((p)=>{
      if(!p.fingerprint)return;
      // Считаем сколько раз это фото уже встречалось (включая оригинал, повторы и предупреждения)
      const c=reportsRef.current.filter((r)=>r.fingerprint&&fingerprintDiff(r.fingerprint,p.fingerprint)<DUPLICATE_THRESHOLD).length;
      if(c>matchCount)matchCount=c;
    });
    if(matchCount>0){
      const tiers=getFraudTiers(lang);
      // matchCount=1 → 1-е нарушение (предупреждение), 2 → штраф 10, 3+ → штраф 30
      const tier=tiers[Math.min(matchCount-1,tiers.length-1)];
      idCounter.current+=1;
      const flaggedReport={id:"r-"+idCounter.current,category:tier.points===0?"предупреждение":"повтор",severity:null,note:tier.note,points:-tier.points,time:"только что",img:primary.dataUrl,fingerprint:primary.fingerprint,location:location||null,pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[flaggedReport,...prev].slice(0,15));
      setPoints((prev)=>Math.max(0,prev-tier.points));
      return {kind:"duplicate",tier,violationNumber:matchCount,analysis:null};
    }
    const geoMatch=location?reportsRef.current.find((r)=>r.location&&r.status!=="cleaned"&&r.category!=="повтор"&&r.category!=="предупреждение"&&r.category!=="та же точка"&&distanceMeters(r.location,location)<GEO_DUPLICATE_RADIUS_M):null;
    if(geoMatch){
      idCounter.current+=1;
      const sameSpotReport={id:"r-"+idCounter.current,category:"та же точка",severity:null,note:"Эта точка уже отмечена на карте — заявка уже создана",points:0,time:"только что",img:primary.dataUrl,fingerprint:primary.fingerprint,location:location||null,pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[sameSpotReport,...prev].slice(0,15));
      return {kind:"samespot",analysis:null,matched:geoMatch,viaHistogram:false,debugSim:"geo"};
    }
    // Собираем активные заявки с фото как эталоны для сравнения ракурсов
    const allCandidates=reportsRef.current.filter((r)=>r.img&&r.status!=="cleaned"&&r.category!=="повтор"&&r.category!=="предупреждение"&&r.category!=="та же точка"&&dataUrlToParts(r.img)).slice(0,3);
    async function callAI(candidatesForCall,timeoutMs){
      const parts=[];
      photosArray.forEach((p,i)=>{
        if(photosArray.length>1)parts.push({text:`Фото ${i+1}:`});
        parts.push({inline_data:{mime_type:p.mediaType||"image/jpeg",data:p.base64}});
      });
      candidatesForCall.forEach((r,i)=>{const cp=dataUrlToParts(r.img);if(cp){parts.push({text:`Эталон ${i+1}:`});parts.push({inline_data:{mime_type:cp.mediaType,data:cp.base64}});}});
      parts.push({text:buildPrompt(photosArray.length,candidatesForCall.length)});
      try{return await callGemini(parts,timeoutMs);}
      catch(networkErr){if(networkErr.name==="AbortError")throw networkErr;console.error("Gemini error:",networkErr.message||networkErr);throw networkErr;}
    }
    let data,usedCandidates=allCandidates;
    try{data=await callAI(allCandidates,45000);}
    catch(err){
      if(allCandidates.length>0){
        try{usedCandidates=[];data=await callAI([],45000);}
        catch(err2){return {kind:"error",msg:err2.name==="AbortError"?"Связь слишком медленная. Попробуй на Wi-Fi.":`Не удалось отправить фото (${err2.message||"ошибка связи"}). Проверь интернет.`};}
      }else if(err.name==="AbortError"){return {kind:"error",msg:"Запрос занял слишком много времени. Попробуй на Wi-Fi."};}
      else{return {kind:"error",msg:err.message||"Не удалось отправить фото — проверь интернет-соединение."};}
    }
    let parsed;
    try{const textBlock=(data.content||[]).map((b)=>b.text||"").join("\n");const clean=textBlock.replace(/```json|```/g,"").trim();parsed=JSON.parse(clean);}
    catch(err){return {kind:"error",msg:"AI ответил в неожиданном формате. Попробуй другое фото — обычно помогает."};}
    const dupIndex=Number(parsed.duplicate_of);
    const aiDuplicateMatch=dupIndex>=1&&dupIndex<=usedCandidates.length?usedCandidates[dupIndex-1]:null;
    if(aiDuplicateMatch){
      idCounter.current+=1;
      const sameSpotReport={id:"r-"+idCounter.current,category:"та же точка",severity:parsed.severity||null,note:"AI узнал ту же кучу мусора с другого ракурса — заявка уже создана",points:0,time:"только что",img:primary.dataUrl,fingerprint:primary.fingerprint,location:location||null,pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[sameSpotReport,...prev].slice(0,15));
      return {kind:"samespot",analysis:parsed,matched:aiDuplicateMatch,viaHistogram:true,debugSim:dupIndex};
    }
    if(parsed.is_trash){
      const pts=(parsed.severity||3)*10; idCounter.current+=1;
      let badge=false;
      const hasEverSubmitted=reportsRef.current.some((r)=>typeof r.id==="string"&&r.id.startsWith("r-"));
      if(!hasEverSubmitted){try{const flag=await window.storage.get("ecobin_first_badge_given",false).catch(()=>null);if(!flag){badge=true;await window.storage.set("ecobin_first_badge_given","1",false).catch(()=>{});}}catch{badge=true;}}
      const newReport={id:"r-"+idCounter.current,category:parsed.category||"мусор",severity:parsed.severity||3,note:parsed.note||"",points:pts,time:"только что",createdAt:Date.now(),img:primary.dataUrl,images:photosArray.map((p)=>p.dataUrl),fingerprint:primary.fingerprint,location:location||null,status:"pending",pos:{top:30+Math.random()*40+"%",left:20+Math.random()*55+"%"}};
      setReports((prev)=>[newReport,...prev].slice(0,15));
      setPoints((prev)=>prev+pts);
      return {kind:"trash",analysis:parsed,points:pts,badge,debugSim:dupIndex||null,report:newReport};
    }
    return {kind:"rejected",analysis:parsed,debugSim:dupIndex||null};
  }

  function enqueuePhoto(photosArray,location){setPendingQueue((prev)=>[...prev,{photosArray,location}].slice(-10));}

  async function submitForAnalysis(){
    if(photos.length===0)return;
    if(typeof navigator!=="undefined"&&navigator.onLine===false){enqueuePhoto(photos,batchLocation);setScreen("queued");return;}
    setScreen("analyzing");setErrorMsg("");
    const beforeCtx=computeAchCtx(reports,points);
    const result=await analyzePhoto(photos,batchLocation,language);
    if(result.kind==="error"){setErrorMsg(result.msg);setScreen("error");return;}
    setAnalysis(result.analysis);
    setDebugSim(result.debugSim!==undefined?result.debugSim:null);
    if(result.kind==="duplicate"){setDupInfo({violationNumber:result.violationNumber,...result.tier});setScreen("duplicate");return;}
    if(result.kind==="samespot"){setSameSpotInfo({matched:result.matched,viaHistogram:result.viaHistogram});setScreen("samespot");return;}
    if(result.kind==="trash"){
      setBadgeUnlocked(!!result.badge);
      const afterReports=result.report?[result.report,...reports]:reports;
      const afterCtx=computeAchCtx(afterReports,points+result.points);
      const newly=ACHIEVEMENTS.filter((a)=>!a.check(beforeCtx)&&a.check(afterCtx));
      setNewAchievements(newly);setScreen("result");return;
    }
    setScreen("rejected");
  }

  const showTabs=screen==="home"||screen==="profile"||screen==="leaderboard"||screen==="settings";
  const t=(key)=>(STRINGS[language]&&STRINGS[language][key])||STRINGS.ru[key]||key;
  const isTelegramApp=typeof window!=="undefined"&&window.Telegram&&window.Telegram.WebApp&&!!window.Telegram.WebApp.initData;
  const LIGHT_PALETTE={forest:"#1B4332",forest2:"#2D6A4F",amber:"#FFB703",lightbg:"#F6FAF7",card:"#EAF4EE",textdark:"#16241F",muted:"#5C6B66",red:"#C1440E",white:"#FFFFFF",track:"#DCEBE2"};
  const DARK_PALETTE={forest:"#3FA374",forest2:"#4FC189",amber:"#FFD166",lightbg:"#0F1C17",card:"#1C2E27",textdark:"#F0F7F3",muted:"#A9C4B8",red:"#FF8A66",white:"#16261F",track:"#26382F"};
  const palette=theme==="dark"?DARK_PALETTE:LIGHT_PALETTE;
  const themeCssVars={"--ecobin-forest":palette.forest,"--ecobin-forest2":palette.forest2,"--ecobin-amber":palette.amber,"--ecobin-lightbg":palette.lightbg,"--ecobin-card":palette.card,"--ecobin-textdark":palette.textdark,"--ecobin-muted":palette.muted,"--ecobin-red":palette.red,"--ecobin-white":palette.white,"--ecobin-track":palette.track};

function TourOverlay({onDone}){
  const t=useT();
  const [step,setStep]=useState(0);
  const [rect,setRect]=useState(null);
  const total=TOUR_STEPS.length;
  const cur=TOUR_STEPS[step];
  useEffect(()=>{
    function measure(){
      const box=document.querySelector('[data-screen-box]');
      const el=document.querySelector(cur.sel);
      if(!box||!el){setRect(null);return;}
      el.scrollIntoView({block:"center",behavior:"smooth"});
      setTimeout(()=>{
        const br=box.getBoundingClientRect();
        const er=el.getBoundingClientRect();
        setRect({top:er.top-br.top,left:er.left-br.left,width:er.width,height:er.height,boxH:br.height});
      },300);
    }
    measure();
    window.addEventListener("resize",measure);
    return()=>window.removeEventListener("resize",measure);
  },[step]);
  function next(){ if(step<total-1){setStep(step+1);} else {finish();} }
  function finish(){ try{localStorage.setItem("ecobin_tour_done","1");}catch{} onDone(); }
  const pad=6;
  const boxH=rect?rect.boxH:600;
  const spotTop=rect?rect.top-pad:0;
  const spotLeft=rect?rect.left-pad:0;
  const spotW=rect?rect.width+pad*2:0;
  const spotH=rect?rect.height+pad*2:0;
  const placeBelow=rect?(spotTop+spotH<boxH*0.55):true;
  const tipTop=rect?(placeBelow?spotTop+spotH+12:null):null;
  const tipBottom=rect?(placeBelow?null:boxH-spotTop+12):null;
  return h("div",{style:{position:"absolute",inset:0,zIndex:40}},
    rect?h("div",{style:{position:"absolute",top:spotTop,left:spotLeft,width:spotW,height:spotH,borderRadius:12,boxShadow:"0 0 0 9999px rgba(8,20,15,0.78)",border:"2px solid "+AMBER,pointerEvents:"none",transition:"all 0.25s ease"}}):h("div",{style:{position:"absolute",inset:0,background:"rgba(8,20,15,0.78)"}}),
    h("div",{onClick:next,style:{position:"absolute",inset:0}}),
    h("div",{style:{position:"absolute",left:16,right:16,...(tipTop!==null?{top:tipTop}:{}),...(tipBottom!==null?{bottom:tipBottom}:{}),background:WHITE,borderRadius:16,padding:"14px 16px",boxShadow:"0 8px 30px rgba(0,0,0,0.35)"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
        h("span",{style:{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:0.5}},(step+1)+" "+t("tourStepOf")+" "+total),
        h("button",{onClick:(e)=>{e.stopPropagation();finish();},style:{background:"none",border:"none",fontSize:11,color:MUTED,cursor:"pointer",padding:0}},t("tourSkip"))
      ),
      h("p",{style:{margin:0,fontSize:15,fontWeight:700,color:TEXTDARK}},t(cur.titleKey)),
      h("p",{style:{margin:"6px 0 0",fontSize:12.5,color:MUTED,lineHeight:1.5}},t(cur.descKey)),
      h("div",{style:{display:"flex",gap:5,marginTop:12,marginBottom:10,justifyContent:"center"}},
        TOUR_STEPS.map((_,i)=>h("span",{key:i,style:{width:i===step?16:6,height:6,borderRadius:3,background:i===step?FOREST:TRACK,transition:"all 0.2s"}}))
      ),
      h("button",{onClick:(e)=>{e.stopPropagation();next();},style:{width:"100%",padding:"11px 0",borderRadius:12,border:"none",background:AMBER,color:"#1B4332",fontWeight:700,fontSize:13.5,cursor:"pointer"}},step===total-1?t("tourFinish"):t("tourNext"))
    )
  );
}

      try{map.fitBounds(L.latLngBounds(pts.map((r)=>[r.location.lat,r.location.lng])).pad(0.35),{animate:false,maxZoom:13});}catch{}

function animOn(){try{return localStorage.getItem("ecobin_anim")!=="false";}catch{return true;}}
function haptic(kind){
  try{
    if(!animOn())return;
    const tg=window.Telegram&&window.Telegram.WebApp;
    if(tg&&tg.HapticFeedback){
      if(kind==="success"){tg.HapticFeedback.notificationOccurred("success");return;}
      if(kind==="heavy"){tg.HapticFeedback.impactOccurred("medium");return;}
      tg.HapticFeedback.impactOccurred("light");return;
    }
    if(navigator.vibrate)navigator.vibrate(kind==="success"?[10,40,10]:8);
  }catch{}
}
function useCountUp(value,duration){
  const [n,setN]=useState(animOn()?0:(Number(value)||0));
  useEffect(()=>{
    const to=Number(value)||0;
    if(!animOn()){setN(to);return;}
    let raf=null,start=null;
    function step(ts){
      if(start===null)start=ts;
      const p=Math.min((ts-start)/(duration||900),1);
      const eased=1-Math.pow(1-p,3);
      setN(to*eased);
      if(p<1)raf=requestAnimationFrame(step); else setN(to);
    }
    raf=requestAnimationFrame(step);
    return()=>{if(raf)cancelAnimationFrame(raf);};
  },[value,duration]);
  return n;
}

function StatMetricCard({label,value,decimals,suffix,sub,delay,accent}){

  const shown=decimals?n.toFixed(decimals):Math.round(n);

      {sub&&<p style={{margin:"2px 0 0",fontSize:10,color:MUTED,fontWeight:600}}>{sub}</p>}
    </div>
  );
}

function CategoryDonut({segments,total,theme}){
  const size=108,stroke=14,r=(size-stroke)/2,C=2*Math.PI*r;
  const [on,setOn]=useState(false);
  useEffect(()=>{const tm=setTimeout(()=>setOn(true),160);return()=>clearTimeout(tm);},[]);
  const n=useCountUp(total,950);
  let acc=0;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={TRACK} strokeWidth={stroke}/>
        {segments.map((s,i)=>{
          const len=C*s.frac;
          const rot=-90+acc*360;
          acc+=s.frac;
          return (
            <circle key={s.key} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke}
              strokeDasharray={`${len} ${C}`} strokeDashoffset={on?0:len} strokeLinecap="butt"
              style={{transform:`rotate(${rot}deg)`,transformOrigin:"50% 50%",transition:`stroke-dashoffset 0.85s cubic-bezier(0.22,0.61,0.36,1) ${0.1+i*0.13}s`}}/>
          );
        })}
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:21,fontWeight:700,color:TEXTDARK,fontFamily:"Georgia, serif",lineHeight:1}}>{Math.round(n)}</span>
      </div>
    </div>
  );
}

function StreakCard({reports}){
  const t=useT();const lang=useLang();
  const {count,days}=computeStreak(reports);
  const [on,setOn]=useState(false);
  useEffect(()=>{const tm=setTimeout(()=>setOn(true),120);return()=>clearTimeout(tm);},[]);
  if(count<2)return null;
  const WD=[t("wdSun"),t("wdMon"),t("wdTue"),t("wdWed"),t("wdThu"),t("wdFri"),t("wdSat")];
  const now=new Date(); now.setHours(12,0,0,0);
  const cells=[];
  for(let i=6;i>=0;i--){
    const ts=now.getTime()-i*86400000;
    cells.push({label:WD[new Date(ts).getDay()],active:days.has(dayKey(ts)),isToday:i===0});
  }
  const todayDone=days.has(dayKey(now.getTime()));
  let word;
  if(lang==="ru")word=pluralRu(count,t("streakDayOne"),t("streakDayFew"),t("streakDayMany"))+" "+t("streakInRow");
  else if(lang==="uz")word=t("streakDayOne")+" "+t("streakInRow");
  else word=(count===1?t("streakDayOne"):t("streakDayMany"))+" "+t("streakInRow");
  return (
    <div className="reveals" style={{marginTop:12,display:"flex",alignItems:"center",gap:11,background:CARD,border:`1px solid ${AMBER}`,borderRadius:14,padding:"10px 12px",opacity:0,animation:"ebCardIn 0.5s cubic-bezier(0.22,0.61,0.36,1) 0.05s both"}}>
      <span style={{fontSize:24,lineHeight:1,animation:"stFire 1.9s ease-in-out infinite"}}>🔥</span>
      <div style={{flex:1,minWidth:0}}>
        <p style={{margin:0,fontSize:12.5,fontWeight:700,color:TEXTDARK}}>{count} {word}</p>
        <div style={{display:"flex",gap:4,marginTop:6}}>
          {cells.map((c,i)=>(
            <span key={i} style={{width:20,height:20,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8.5,fontWeight:700,flexShrink:0,
              background:c.isToday&&c.active?AMBER:(c.active?FOREST2:TRACK),
              color:c.isToday&&c.active?FOREST:(c.active?"#FFFFFF":MUTED),
              transform:on?"scale(1)":"scale(0.6)",opacity:on?1:0,
              transition:`all 0.35s cubic-bezier(0.34,1.4,0.64,1) ${0.1+i*0.05}s`}}>{c.label}</span>
          ))}
        </div>
        <p style={{margin:"6px 0 0",fontSize:10,color:MUTED}}>{todayDone?t("streakSafe"):t("streakKeep")}</p>
      </div>
      <style>{`@keyframes stFire{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}`}</style>
    </div>
  );
}

function playSuccessTone(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[523.25,659.25,783.99].forEach((freq,i)=>{const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type="sine";osc.frequency.value=freq;const start=ctx.currentTime+i*0.09;gain.gain.setValueAtTime(0,start);gain.gain.linearRampToValueAtTime(0.15,start+0.02);gain.gain.exponentialRampToValueAtTime(0.001,start+0.25);osc.connect(gain);gain.connect(ctx.destination);osc.start(start);osc.stop(start+0.26);});setTimeout(()=>ctx.close(),600);}catch{}
  if(navigator.vibrate){try{navigator.vibrate([40,30,60]);}catch{}}
}
